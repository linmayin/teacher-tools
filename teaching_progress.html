<!DOCTYPE html><!-- v1782749010 -->
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="教學進度">
<link rel="apple-touch-icon" href="icon_jiao.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>教學進度表</title>
<meta name="version" content="1782748308">
<style>
  :root {
    --ink: #1c1c1e;
    --ink-light: #6c6c70;
    --paper: #ffffff;
    --paper-warm: #f2f2f7;
    --paper-mid: #e5e5ea;
    --rule: #d1d1d6;
    --rule-strong: #aeaeb2;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --flex-bg: #eef3fb;
    --flex-border: #a8c0e8;
    --flex-text: #2c5f9e;
    --eighth-bg: #f3eefb;
    --eighth-border: #c5a8e8;
    --eighth-text: #6b3fa0;
    --exam-bg: #fdecea;
    --exam-border: #f5b7b1;
    --exam-text: #c0392b;
    --review-bg: #fff8e1;
    --review-border: #ffe082;
    --review-text: #856404;
    --holiday-bg: #fff3ea;
    --holiday-border: #f0c999;
    --holiday-text: #8b5e3c;
    --drag-over: #d4edda;
    --radius: 10px;
    --font: -apple-system,'Helvetica Neue','PingFang TC',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--paper-warm);color:var(--ink);min-height:100vh;font-size:14px;-webkit-text-size-adjust:100%;}

  /* HEADER */
  #header{background:var(--paper);border-bottom:1px solid var(--rule);padding:12px 16px 8px;position:sticky;top:0;z-index:100;}
  #header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
  #title-block h1{font-size:17px;font-weight:700;}
  #title-block h2{font-size:12px;font-weight:400;color:var(--ink-light);margin-top:1px;}
  #week-nav{display:flex;align-items:center;gap:6px;}
  #week-nav button{background:var(--paper-warm);border:1px solid var(--rule);color:var(--ink);width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  #week-nav button:hover{background:var(--paper-mid);}
  #week-label{font-size:16px;font-weight:700;min-width:64px;text-align:center;}
  #header-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .hdr-btn{background:var(--paper-warm);border:1px solid var(--rule);color:var(--ink);padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:background .15s;}
  .hdr-btn:hover{background:var(--paper-mid);}
  .hdr-btn.primary{background:var(--accent);color:white;border-color:var(--accent);}
  .hdr-btn.primary:hover{opacity:.88;}

  /* DATE BAR */
  #date-bar{display:flex;gap:4px;}
  .date-chip{flex:1;text-align:center;padding:4px 2px;border-radius:6px;font-size:11px;color:var(--ink-light);}
  .date-chip .dow{font-weight:600;font-size:12px;color:var(--ink);}
  .date-chip.sp-exam .dow,.date-chip.sp-exam{color:var(--exam-text);}
  .date-chip.sp-review .dow,.date-chip.sp-review{color:var(--review-text);}
  .date-chip.sp-holiday .dow,.date-chip.sp-holiday{color:var(--holiday-text);}

  /* MAIN */
  #main{padding:12px 12px 100px;overflow-x:auto;}
  .week-note-row{background:var(--paper);border:1px solid var(--rule);border-radius:var(--radius);padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
  .week-note-row label{font-size:12px;color:var(--ink-light);min-width:56px;font-weight:600;}

  .week-note-row input{flex:1;border:none;font-family:var(--font);font-size:13px;color:var(--ink);outline:none;background:transparent;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 12px;background:var(--paper);border-radius:var(--radius);border:1px solid var(--rule);margin-bottom:10px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-light);}
  .legend-dot{width:12px;height:12px;border-radius:3px;}

  /* TABLE */
  .progress-table{width:100%;min-width:520px;border-collapse:separate;border-spacing:0 4px;}
  .progress-table thead th{background:var(--ink);color:white;padding:8px 6px;font-size:13px;font-weight:700;text-align:center;}
  .progress-table thead th:first-child{background:transparent;width:52px;min-width:52px;}
  .progress-table thead th:nth-child(2){border-radius:8px 0 0 0;}
  .progress-table thead th:last-child{border-radius:0 8px 0 0;}
  .progress-table tbody tr{vertical-align:top;}

  /* Day label */
  .day-cell{padding:0 6px 0 0;width:52px;min-width:52px;}
  .day-label{background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:6px 4px;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
  .day-label .dow-text{font-size:13px;font-weight:700;}
  .day-label .date-text{font-size:11px;color:var(--ink-light);}
  .day-label.sp-exam{background:var(--exam-bg);border-color:var(--exam-border);}
  .day-label.sp-exam .dow-text{color:var(--exam-text);}
  .day-label.sp-review{background:var(--review-bg);border-color:var(--review-border);}
  .day-label.sp-review .dow-text{color:var(--review-text);}
  .day-label.sp-holiday{background:var(--holiday-bg);border-color:var(--holiday-border);}
  .day-label.sp-holiday .dow-text{color:var(--holiday-text);}
  .special-tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px;}
  .special-tag.exam{background:var(--exam-bg);color:var(--exam-text);border:1px solid var(--exam-border);}
  .special-tag.review{background:var(--review-bg);color:var(--review-text);border:1px solid var(--review-border);}
  .special-tag.holiday{background:var(--holiday-bg);color:var(--holiday-text);border:1px solid var(--holiday-border);}

  /* Class cell */
  .class-cell{padding:0 3px;}
  .class-cell:last-child{padding-right:0;}
  .cell-wrapper{display:flex;flex-direction:column;gap:3px;}

  /* Period block */
  .period-block{background:var(--paper);border:1px solid var(--rule);border-radius:8px;overflow:hidden;position:relative;transition:box-shadow .15s;}
  .period-block:focus-within{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);}
  .period-block.flex-block{background:var(--flex-bg);border-color:var(--flex-border);}
  .period-block.flex-block:focus-within{border-color:var(--flex-text);}
  .period-block.eighth-block{background:var(--eighth-bg);border-color:var(--eighth-border);}
  .period-block.exam-block{background:var(--exam-bg);border-color:var(--exam-border);}
  .period-block.review-block{background:var(--review-bg);border-color:var(--review-border);}
  .period-block.no-class{background:var(--paper-warm);border:1px dashed var(--rule);min-height:100px;display:flex;align-items:center;justify-content:center;}
  .no-class-dash{color:var(--rule-strong);font-size:16px;}

  /* Drag states */
  .period-block.dragging{opacity:.4;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .period-block.drag-over{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);background:var(--drag-over)!important;}

  .period-block-header{padding:3px 7px 3px 6px;font-size:10px;font-weight:700;border-bottom:1px solid var(--rule);background:rgba(0,0,0,.02);color:var(--ink-light);display:flex;align-items:center;justify-content:space-between;gap:4px;}
  .period-block-header.flex-hdr{color:var(--flex-text);}
  .period-block-header.eighth-hdr{color:var(--eighth-text);}
  .period-block-header.exam-hdr{color:var(--exam-text);}
  .period-block-header.review-hdr{color:var(--review-text);}

  /* Drag handle + copy btn */
  .block-actions{display:flex;gap:4px;align-items:center;}
  .drag-handle{cursor:grab;font-size:12px;color:var(--rule-strong);user-select:none;padding:0 2px;}
  .drag-handle:active{cursor:grabbing;}
  .copy-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--rule-strong);padding:0 2px;line-height:1;font-family:var(--font);}
  .copy-btn:hover{color:var(--accent);}

  /* Fields */
  .fields-grid{display:flex;flex-direction:column;}
  .field-row{display:flex;align-items:stretch;border-bottom:1px solid var(--rule);min-height:32px;}
  .field-row:last-child{border-bottom:none;}
  .field-lbl{width:28px;min-width:28px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-light);border-right:1px solid var(--rule);background:rgba(0,0,0,.02);flex-shrink:0;}
  .field-lbl.exam-lbl{color:var(--exam-text);}
  .field-ta{flex:1;border:none;background:transparent;font-family:var(--font);font-size:12px;color:var(--ink);padding:5px 6px;resize:none;outline:none;line-height:1.45;min-height:32px;width:100%;overflow:hidden;}
  .field-ta::placeholder{color:#ccc;}

  /* BOTTOM BAR */
  #bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--rule);display:flex;justify-content:space-around;padding:10px 0 22px;z-index:100;}
  .bottom-btn{color:var(--ink-light);border:none;background:none;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 14px;border-radius:8px;font-family:var(--font);transition:color .15s;}
  .bottom-btn:hover{color:var(--ink);}
  .bottom-btn .icon{font-size:22px;}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--paper);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:720px;max-height:88vh;overflow-y:auto;}
  .modal h3{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
  .modal-close{background:var(--paper-mid);border:none;width:28px;height:28px;border-radius:50%;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-light);}
  .setting-section{margin-bottom:22px;}
  .setting-section h4{font-size:11px;font-weight:700;color:var(--ink-light);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--rule);text-transform:uppercase;letter-spacing:.8px;}
  .form-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .form-row label{font-size:13px;min-width:72px;color:var(--ink-light);}
  .form-input{border:1.5px solid var(--rule);border-radius:8px;padding:8px 10px;font-family:var(--font);font-size:13px;color:var(--ink);background:var(--paper);flex:1;min-width:100px;-webkit-appearance:none;}
  .form-input:focus{outline:none;border-color:var(--accent);}
  .class-setup-card{background:var(--paper-warm);border:1.5px solid var(--rule);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .class-setup-card h5{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .day-schedule{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
  .day-col>label{font-size:11px;font-weight:600;color:var(--ink-light);display:block;margin-bottom:4px;text-align:center;}
  .day-col select{width:100%;border:1px solid var(--rule);border-radius:6px;padding:5px 2px;font-size:12px;text-align:center;background:var(--paper);color:var(--ink);-webkit-appearance:none;}
  .checkbox-row{display:flex;align-items:center;gap:4px;margin-top:5px;font-size:11px;color:var(--ink-light);}
  .save-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:var(--font);transition:opacity .15s;}
  .save-btn:hover{opacity:.88;}
  .add-btn{width:100%;background:var(--paper-warm);color:var(--accent);border:1.5px dashed var(--accent);border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;font-family:var(--font);}
  .json-import-box{background:var(--paper-warm);border:1.5px solid var(--rule);border-radius:var(--radius);padding:14px;margin-bottom:16px;}
  .json-ta{width:100%;min-height:80px;border:1.5px solid var(--rule);border-radius:8px;padding:8px 10px;font-family:'Menlo','Courier New',monospace;font-size:12px;color:var(--ink);background:var(--paper);resize:vertical;outline:none;margin-bottom:8px;}
  .json-ta:focus{border-color:var(--accent);}
  .import-btn{background:var(--flex-text);color:white;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);}
  .import-msg{font-size:12px;margin-top:6px;}
  .import-msg.ok{color:var(--accent);}
  .import-msg.err{color:var(--exam-text);}
  .special-form{background:var(--paper-warm);border:1.5px solid var(--rule);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .special-item{background:var(--paper);border:1.5px solid var(--rule);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .type-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:6px;}
  .type-badge.exam{background:var(--exam-bg);color:var(--exam-text);}
  .type-badge.review{background:var(--review-bg);color:var(--review-text);}
  .type-badge.holiday{background:var(--holiday-bg);color:var(--holiday-text);}
  .type-badge.other{background:var(--paper-mid);color:var(--ink-light);}
  .del-btn{background:none;border:none;color:var(--rule-strong);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;}
  .del-btn:hover{color:var(--exam-text);}

  /* BATCH COPY MODAL */
  #copy-modal .modal{max-width:500px;}
  .copy-section{margin-bottom:16px;}
  .copy-section h4{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--ink-light);}
  .class-pick-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .class-pick-btn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--rule);background:var(--paper);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
  .class-pick-btn.selected{background:var(--accent);color:white;border-color:var(--accent);}
  .week-range-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .week-range-row label{font-size:13px;color:var(--ink-light);min-width:48px;}
  .week-num-input{border:1.5px solid var(--rule);border-radius:8px;padding:7px 10px;font-family:var(--font);font-size:13px;color:var(--ink);background:var(--paper);width:70px;-webkit-appearance:none;outline:none;}
  .week-num-input:focus{border-color:var(--accent);}
  .copy-execute-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s;margin-top:4px;}
  .copy-execute-btn:hover{opacity:.88;}
  .copy-msg{font-size:13px;margin-top:10px;text-align:center;}
  .copy-msg.ok{color:var(--accent);}
  .copy-msg.err{color:var(--exam-text);}

  /* Holiday row */
  .holiday-row td { pointer-events:none; }
  .holiday-row .class-cell { background: var(--holiday-bg); border-radius:8px; }
  .holiday-cell {
    background: var(--holiday-bg) !important;
    border: 1.5px solid var(--holiday-border);
    display:flex; align-items:center; justify-content:center;
    min-height:100px; border-radius:8px;
    color: var(--holiday-text); font-size:13px; font-weight:600;
  }
  .holiday-row .day-cell { pointer-events:auto; }

  /* Reschedule */
  .reschedule-src .period-block {
    opacity:0.45; pointer-events:none; position:relative;
  }
  .reschedule-src .period-block::after {
    content:'🔄 調課';
    position:absolute; inset:0; display:flex;
    align-items:center; justify-content:center;
    font-size:12px; font-weight:700; color:var(--ink-light);
    background:rgba(242,242,247,0.7); border-radius:8px;
  }
  .period-block.reschedule-block {
    background:#fff8f0; border-color:#f0b86e;
  }
  .period-block.reschedule-block .period-block-header { color:#b45309; }
  .period-block.reschedule-block:focus-within { border-color:#b45309; }

  /* Reschedule modal */
  .rs-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .rs-col h4 { font-size:11px; font-weight:700; color:var(--ink-light); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }

  /* Toast */
  #save-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:8px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none;white-space:nowrap;}
  #save-toast.show{opacity:1;}

  @media(min-width:768px){
    .modal{border-radius:20px;margin:auto;margin-bottom:20px;}
    .modal-overlay{align-items:center;}
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="title-block">
      <h1 id="year-title">115學年度 上學期</h1>
      <h2 id="week-subtitle">第 1 週</h2>
    </div>
    <div id="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <span id="week-label">第1週</span>
      <button onclick="changeWeek(1)">›</button>
    </div>
    <div id="header-actions">
      <button class="hdr-btn" onclick="openModal('settings-modal')">⚙ 設定</button>
      <button class="hdr-btn" onclick="openModal('special-modal')">📅 特殊日</button>
      <button class="hdr-btn" onclick="openModal('reschedule-modal')">🔄 調課</button>
      <button class="hdr-btn primary" onclick="exportAllWeeks()">↓ 匯出全學期</button>
    </div>
  </div>
  <div id="date-bar"></div>
</div>

<div id="main"></div>
<div id="save-toast">已儲存 ✓</div>

<div id="bottom-bar">
  <button class="bottom-btn" onclick="changeWeek(-1)"><span class="icon">‹</span>上一週</button>
  <button class="bottom-btn" onclick="openModal('settings-modal')"><span class="icon">⚙</span>設定</button>
  <button class="bottom-btn" onclick="openModal('special-modal')"><span class="icon">📅</span>特殊日</button>
  <button class="bottom-btn" onclick="changeWeek(1)"><span class="icon">›</span>下一週</button>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>設定 <button class="modal-close" onclick="closeModal('settings-modal')">✕</button></h3>
    <div class="setting-section">
      <h4>學期資訊</h4>
      <div class="form-row">
        <label>學年度</label>
        <input class="form-input" id="set-year" placeholder="115" style="max-width:80px">
        <label>學期</label>
        <select class="form-input" id="set-sem" style="max-width:110px">
          <option value="上">上學期</option>
          <option value="下">下學期</option>
        </select>
      </div>
      <div class="form-row">
        <label>學期開始日</label>
        <input class="form-input" type="date" id="set-start" style="max-width:190px">
      </div>
      <div class="form-row">
        <label>總週數</label>
        <input class="form-input" type="number" id="set-weeks" placeholder="20" min="1" max="25" style="max-width:80px">
      </div>
    </div>
    <div class="setting-section">
      <h4>課表 JSON 匯入</h4>
      <div class="json-import-box">
        <textarea class="json-ta" id="schedule-json" placeholder="貼上 Claude 產生的課表 JSON…"></textarea>
        <button class="import-btn" onclick="importScheduleJSON()">匯入課表</button>
        <div class="import-msg" id="schedule-msg"></div>
      </div>
    </div>
    <div class="setting-section">
      <h4>班級課表（手動設定）</h4>
      <div id="class-setups"></div>
      <button class="add-btn" onclick="addClassSetup()">＋ 新增班級</button>
    </div>
    <button class="save-btn" onclick="saveSettings()">儲存設定</button>
  </div>
</div>

<!-- SPECIAL DAYS MODAL -->
<div class="modal-overlay" id="special-modal">
  <div class="modal">
    <h3>特殊日設定 <button class="modal-close" onclick="closeModal('special-modal')">✕</button></h3>
    <div class="setting-section">
      <h4>行事曆 JSON 匯入</h4>
      <div class="json-import-box">
        <textarea class="json-ta" id="calendar-json" placeholder="貼上 Claude 產生的行事曆 JSON…"></textarea>
        <button class="import-btn" onclick="importCalendarJSON()">匯入行事曆</button>
        <div class="import-msg" id="calendar-msg"></div>
      </div>
    </div>
    <div class="setting-section">
      <h4>手動新增特殊日</h4>
      <div class="special-form">
        <div class="form-row">
          <label>開始日期</label>

            <option value="other">其他</option>

</div>

<!-- RESCHEDULE MODAL -->
<div class="modal-overlay" id="reschedule-modal">
  <div class="modal" style="max-width:560px">
    <h3>調課設定 <button class="modal-close" onclick="closeModal('reschedule-modal')">✕</button></h3>
    <p style="font-size:12px;color:var(--ink-light);margin-bottom:16px;line-height:1.6">設定某班某節課從原定日期移到另一天。來源格鎖定不可輸入，目標格新增「調課補課」區塊。</p>

    <div class="rs-grid">
      <div class="rs-col">
        <h4>來源（原本的課）</h4>
        <div class="form-row"><label>班級</label>
          <select class="form-input" id="rs-src-class"></select></div>
        <div class="form-row"><label>週次</label>
          <input type="number" class="form-input" id="rs-src-week" min="1" max="25" style="max-width:70px"></div>
        <div class="form-row"><label>星期</label>
          <select class="form-input" id="rs-src-day">
            <option value="0">週一</option><option value="1">週二</option>
            <option value="2">週三</option><option value="3">週四</option>
            <option value="4">週五</option>
          </select></div>
        <div class="form-row" id="rs-src-variant-row" style="font-size:12px;color:var(--ink-light)">節次類型將依課表自動對應</div>
      </div>
      <div class="rs-col">
        <h4>目標（調到的日期）</h4>
        <div class="form-row"><label>週次</label>
          <input type="number" class="form-input" id="rs-dst-week" min="1" max="25" style="max-width:70px"></div>
        <div class="form-row"><label>星期</label>
          <select class="form-input" id="rs-dst-day">
            <option value="0">週一</option><option value="1">週二</option>
            <option value="2">週三</option><option value="3">週四</option>
            <option value="4">週五</option>
          </select></div>
        <div class="form-row"><label>節次</label>
          <select class="form-input" id="rs-dst-period">
            <option value="1">第1節</option><option value="2">第2節</option>
            <option value="3">第3節</option><option value="4">第4節</option>
            <option value="5">第5節</option><option value="6">第6節</option>
            <option value="7">第7節</option><option value="8">第8節</option>
          </select></div>
      </div>
    </div>
    <div class="form-row"><label>說明</label>
      <input class="form-input" id="rs-note" placeholder="例：因校外教學補課"></div>

    <button class="save-btn" onclick="addReschedule()">新增調課</button>

    <div class="setting-section" style="margin-top:20px">
      <h4>已設定的調課</h4>
      <div id="reschedule-list"></div>
    </div>
  </div>
</div>

<script>
const DAYS_ZH=['週一','週二','週三','週四','週五'];
const FIELD_LABELS=['考試','進度','作業'];
const TYPE_LABEL={exam:'段考',review:'複習考',holiday:'放假',other:'特殊'};
const TYPE_COLORS={exam:'var(--exam-text)',review:'var(--review-text)',holiday:'var(--holiday-text)',other:'var(--ink-light)'};

let state={year:'115',semester:'上',startDate:'2025-09-01',totalWeeks:20,currentWeek:1,classes:[],specialDays:[],reschedules:[],data:{}};

// drag state
let dragSrc=null; // {week,di,ci,blockType}

function loadState(){
  try{
    const s=localStorage.getItem('teachingProgress_v5');
    if(s){
      const parsed=JSON.parse(s);
      // Sanitize classes: fix any corrupted schedule entries
      if(parsed.classes && Array.isArray(parsed.classes)){
        parsed.classes=parsed.classes.map(cls=>{
          if(!cls||!Array.isArray(cls.schedule))return cls;
          cls.schedule=cls.schedule.map(ds=>{
            if(!ds)return null;
            // period must be a string like "第N節" or null
            if(ds.period!==null && ds.period!==undefined && typeof ds.period!=='string')ds.period=null;
            if(typeof ds.isFlex!=='boolean')ds.isFlex=false;
            if(typeof ds.hasEighth!=='boolean')ds.hasEighth=false;
            // If no period, no eighth, and not flex, treat as null (no class)
            if(!ds.period && !ds.hasEighth && !ds.isFlex)return null;
            return ds;
          });
          return cls;
        });
      }
      if(!parsed.reschedules||!Array.isArray(parsed.reschedules))parsed.reschedules=[];
      Object.assign(state,parsed);
    }
  }catch(e){
    console.warn('Failed to load state, resetting:',e);
    localStorage.removeItem('teachingProgress_v5');
  }
}
function saveState(){
  localStorage.setItem('teachingProgress_v5',JSON.stringify(state));
  showToast();
}
function showToast(){
  const t=document.getElementById('save-toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1400);
}

// DATE
function getWeekMonday(w){
  if(!state.startDate)return null;
  const s=new Date(state.startDate);
  const dow=s.getDay();
  const toMon=dow===0?1:(dow===1?0:8-dow);
  s.setDate(s.getDate()+toMon+(w-1)*7);
  return s;
}
function getDayDate(w,di){
  const m=getWeekMonday(w);if(!m)return null;
  const d=new Date(m);d.setDate(d.getDate()+di);return d;
}
function dateKey(d){return d?d.toISOString().slice(0,10):'';}
function formatMD(d){return d?`${d.getMonth()+1}/${d.getDate()}`:''}
function getSpecialDay(d){
  if(!d)return null;
  const k=dateKey(d);
  return state.specialDays.find(s=>s.date===k)||null;
}

// RENDER
function render(){updateHeader();renderMain();}

function updateHeader(){
  document.getElementById('year-title').textContent=`${state.year}學年度 ${state.semester}學期`;
  document.getElementById('week-label').textContent=`第${state.currentWeek}週`;
  document.getElementById('week-subtitle').textContent=`第 ${state.currentWeek} 週`;
  let bar='';
  for(let d=0;d<5;d++){
    const date=getDayDate(state.currentWeek,d);
    const sp=getSpecialDay(date);
    const cls=sp?`date-chip sp-${sp.type}`:'date-chip';
    bar+=`<div class="${cls}"><div class="dow">${DAYS_ZH[d]}</div><div class="md">${formatMD(date)}</div></div>`;
  }
  document.getElementById('date-bar').innerHTML=bar;
}

function renderMain(){
  const container=document.getElementById('main');
  const classes=state.classes;
  let html=`<div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--flex-bg);border:1.5px solid var(--flex-border)"></div>彈性課程</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--eighth-bg);border:1.5px solid var(--eighth-border)"></div>第八節補課</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--exam-bg);border:1.5px solid var(--exam-border)"></div>段考</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--review-bg);border:1.5px solid var(--review-border)"></div>複習考</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--holiday-bg);border:1.5px solid var(--holiday-border)"></div>放假日</div>
    <div class="legend-item" style="margin-left:auto"><button class="hdr-btn" onclick="openCopyModal()" style="font-size:12px;padding:4px 10px">⇄ 批次複製</button></div>
  </div>`;

  const wKey=`w${state.currentWeek}_note`;
  html+=`<div class="week-note-row">
    <label>本週備註</label>
    <input value="${esc(state.data[wKey]||'')}" placeholder="本週特別事項…" oninput="saveField('${wKey}',this.value)">
  </div>`;


  if(!classes.length){
    html+=`<div style="text-align:center;padding:60px 20px;color:var(--ink-light)">
      <div style="font-size:40px;margin-bottom:12px">📋</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">尚未設定班級</div>
      <div style="font-size:13px">請點「設定」新增班級課表，或匯入課表 JSON</div>
    </div>`;
    container.innerHTML=html;return;
  }

  html+=`<table class="progress-table"><thead><tr><th></th>`;
  classes.forEach(cls=>{html+=`<th>${esc(cls.name)}</th>`;});
  html+=`</tr></thead><tbody>`;

  for(let di=0;di<5;di++){
    const date=getDayDate(state.currentWeek,di);
    const sp=getSpecialDay(date);
    const spType=sp?.type||'';

    const isHoliday = spType==='holiday';
    html+=`<tr class="${isHoliday?'holiday-row':''}">`;
    // Day label (no period hint)
    const dlCls=spType?`day-label sp-${spType}`:'day-label';
    const spTag=spType?`<div class="special-tag ${spType}">${TYPE_LABEL[spType]||''}</div>`:'';
    const spNote=sp?`<div style="font-size:9px;color:${TYPE_COLORS[spType]||'var(--ink-light)'};margin-top:2px;max-width:48px;word-break:break-all;text-align:center">${esc(sp.note)}</div>`:'';
    html+=`<td class="day-cell"><div class="${dlCls}">
      <div class="dow-text">${DAYS_ZH[di]}</div>
      <div class="date-text">${formatMD(date)}</div>
      ${spTag}${spNote}
    </div></td>`;

    classes.forEach((cls,ci)=>{
      const ds=cls.schedule[di];
      html+=`<td class="class-cell"><div class="cell-wrapper">`;
      {
        // Check for reschedule destinations arriving at this slot (regardless of ds)
        const dstRsList=state.reschedules.filter(r=>r.ci===ci&&r.dstWeek===state.currentWeek&&r.dstDi===di);

        if(!ds){
          if(!dstRsList.length){
            html+=`<div class="period-block no-class"><div class="no-class-dash">—</div></div>`;
          }
        } else {
          // Check if this slot is a reschedule source (locked)
          const srcRsN=state.reschedules.some(r=>r.ci===ci&&r.srcWeek===state.currentWeek&&r.srcDi===di&&r.srcVariant!=='8');
          const srcRs8=state.reschedules.some(r=>r.ci===ci&&r.srcWeek===state.currentWeek&&r.srcDi===di&&r.srcVariant==='8');

          if(ds.period || ds.isFlex){
            if(srcRsN){
              html+=`<div class="reschedule-src">${makePeriodBlock(di,ci,ds,spType,'n')}</div>`;
            } else {
              html+=makePeriodBlock(di,ci,ds,spType,'n');
            }
          }
          if(ds.hasEighth){
            if(srcRs8){
              html+=`<div class="reschedule-src">${makePeriodBlock(di,ci,ds,spType,'8')}</div>`;
            } else {
              html+=makePeriodBlock(di,ci,ds,spType,'8');
            }
          }
        }
        // Render reschedule destination blocks (works whether ds exists or not)
        dstRsList.forEach(r=>{
          const rKey=`rs_${r.id}_f`;
          const srcDs=state.classes[ci]?.schedule[r.srcDi];
          const isRsFlex=srcDs?.isFlex||false;
          const blockCls=r.srcVariant==='8'?'period-block eighth-block reschedule-block':
                         isRsFlex?'period-block flex-block reschedule-block':
                         'period-block reschedule-block';
          const dstP=r.dstPeriod?`第${r.dstPeriod}節`:'';
          const hdrLabel=r.srcVariant==='8'?`🔄 調課補課${dstP?'（'+dstP+'）':''}`:
                         isRsFlex?`🔄 調課補課（彈性${dstP?' '+dstP:''}）`:`🔄 調課補課${dstP?' '+dstP:''}`;
          html+=`<div class="${blockCls}">
            <div class="period-block-header">${hdrLabel}${r.note?' ·'+esc(r.note):''}
              <div class="block-actions"><button class="copy-btn" onclick="removeReschedule('${r.id}')">✕</button></div>
            </div>
            <div class="fields-grid">`;
          FIELD_LABELS.forEach((lbl,fi)=>{
            const fkey=`${rKey}${fi}`;
            const val=state.data[fkey]||'';
            html+=`<div class="field-row">
              <div class="field-lbl ${fi===0?'exam-lbl':''}">${lbl}</div>
              <textarea class="field-ta" oninput="saveField('${fkey}',this.value);autoResize(this)" onfocus="autoResize(this)">${esc(val)}</textarea>
            </div>`;
          });
          html+=`</div></div>`;
        });
      }
      html+=`</div></td>`;
    });
    html+=`</tr>`;
  }
  html+=`</tbody></table>`;
  container.innerHTML=html;
  container.querySelectorAll('textarea').forEach(ta=>autoResize(ta));
  setupDragDrop();
}

function makePeriodBlock(di,ci,ds,spType,variant){
  const isEighth=variant==='8';
  const isFlex=!isEighth&&ds.isFlex;
  let blockCls='period-block';
  let hdrCls='period-block-header';
  if(isEighth){blockCls+=' eighth-block';hdrCls+=' eighth-hdr';}
  else if(isFlex){blockCls+=' flex-block';hdrCls+=' flex-hdr';}
  else if(spType==='exam'){blockCls+=' exam-block';hdrCls+=' exam-hdr';}
  else if(spType==='review'){blockCls+=' review-block';hdrCls+=' review-hdr';}

  const hdrLabel=isEighth?'第8節（補課）':isFlex?(ds.period?`${ds.period}（彈性）`:'彈性課程'):(ds.period||'');
  const w=state.currentWeek;

  let fields='';
  FIELD_LABELS.forEach((lbl,fi)=>{
    const key=`w${w}_d${di}_c${ci}_${variant}_f${fi}`;
    const val=state.data[key]||'';
    fields+=`<div class="field-row">
      <div class="field-lbl ${fi===0?'exam-lbl':''}">${lbl}</div>
      <textarea class="field-ta" oninput="saveField('${key}',this.value);autoResize(this)" onfocus="autoResize(this)">${esc(val)}</textarea>
    </div>`;
  });

  return `<div class="${blockCls}" draggable="true"
    data-di="${di}" data-ci="${ci}" data-variant="${variant}"
    ondragstart="onDragStart(event,${di},${ci},'${variant}')"
    ondragover="onDragOver(event)"
    ondragleave="onDragLeave(event)"
    ondrop="onDrop(event,${di},${ci},'${variant}')">
    <div class="${hdrCls}">
      <span>${hdrLabel}</span>
      <div class="block-actions">
        <span class="drag-handle" title="拖曳到其他班">⠿</span>
        <button class="copy-btn" title="複製到其他班" onclick="openSingleCopy(${di},${ci},'${variant}')">複製→</button>
      </div>
    </div>
    <div class="fields-grid">${fields}</div>
  </div>`;
}

function autoResize(el){el.style.height='auto';el.style.height=Math.max(30,el.scrollHeight)+'px';}
function saveField(key,val){state.data[key]=val;saveState();}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// NAVIGATION
function changeWeek(d){
  const n=state.currentWeek+d;
  if(n<1||n>state.totalWeeks)return;
  state.currentWeek=n;saveState();render();
}

// DRAG & DROP
function setupDragDrop(){} // handled via inline ondrag*

function onDragStart(e,di,ci,variant){
  dragSrc={week:state.currentWeek,di,ci,variant};
  setTimeout(()=>{
    const el=e.target;
    if(el)el.classList.add('dragging');
  },0);
}

function onDragOver(e){
  e.preventDefault();
  const block=e.currentTarget;
  block.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e,di,ci,variant){
  e.preventDefault();
  const block=e.currentTarget;
  block.classList.remove('drag-over');
  document.querySelectorAll('.period-block.dragging').forEach(el=>el.classList.remove('dragging'));

  if(!dragSrc)return;
  if(dragSrc.di===di&&dragSrc.ci===ci&&dragSrc.variant===variant)return; // same block

  // Copy data from src to dst (current week)
  const w=state.currentWeek;
  FIELD_LABELS.forEach((_,fi)=>{
    const srcKey=`w${dragSrc.week}_d${dragSrc.di}_c${dragSrc.ci}_${dragSrc.variant}_f${fi}`;
    const dstKey=`w${w}_d${di}_c${ci}_${variant}_f${fi}`;
    state.data[dstKey]=state.data[srcKey]||'';
  });
  dragSrc=null;
  saveState();
  render();
}

// SINGLE CELL COPY (cross-day enabled)
let singleCopySrc=null;
function openSingleCopy(di,ci,variant){
  singleCopySrc={week:state.currentWeek,di,ci,variant};
  const classes=state.classes;
  const srcName=classes[ci]?.name||'?';
  const srcDs=classes[ci]?.schedule[di];
  const varLabel=variant==='8'?'第8節':(srcDs?.isFlex?'彈性':'一般節');

  // Build class buttons (exclude self)
  const classBtns=classes.map((cls,idx)=>{
    if(idx===ci)return'';
    return`<button class="class-pick-btn" id="sc-cls-${idx}" onclick="scSelectClass(${idx})">${esc(cls.name)}</button>`;
  }).join('');

  // Day buttons
  const dayBtns=DAYS_ZH.map((d,idx)=>
    `<button class="class-pick-btn" id="sc-day-${idx}" onclick="scSelectDay(${idx})">${d}</button>`
  ).join('');

  // Variant buttons
  const varBtns=[
    {k:'n-normal',l:'一般節'},
    {k:'n-flex',l:'彈性'},
    {k:'8',l:'第8節'}
  ].map(v=>`<button class="class-pick-btn" id="sc-var-${v.k}" onclick="scSelectVar('${v.k}')">${v.l}</button>`).join('');

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:250;display:flex;align-items:flex-end;justify-content:center';
  overlay.innerHTML=`<div style="background:var(--paper);border-radius:20px 20px 0 0;padding:20px 20px 36px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto">
    <div style="font-size:15px;font-weight:700;margin-bottom:2px">複製 ${esc(srcName)} ${DAYS_ZH[di]} ${varLabel}</div>
    <div style="font-size:12px;color:var(--ink-light);margin-bottom:16px">選擇目標班級、天、節次類型（可跨天）</div>

    <div style="font-size:11px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">目標班級</div>
    <div class="class-pick-grid" style="margin-bottom:14px">${classBtns}</div>

    <div style="font-size:11px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">目標天</div>
    <div class="class-pick-grid" style="margin-bottom:14px">${dayBtns}</div>

    <div style="font-size:11px;font-weight:700;color:var(--ink-light);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">目標節次類型</div>
    <div class="class-pick-grid" style="margin-bottom:16px">${varBtns}</div>

    <div id="sc-msg" style="font-size:12px;color:var(--exam-text);min-height:18px;margin-bottom:8px"></div>

function executeSingleCopy(){
  const msg=document.getElementById('sc-msg');
  const dstCi=window._scDstCi;
  const dstDi=window._scDstDi;
  const dstVarKey=window._scDstVar;
  if(dstCi==null){msg.textContent='請選擇目標班級';return;}
  if(dstDi==null){msg.textContent='請選擇目標天';return;}
  if(!dstVarKey){msg.textContent='請選擇節次類型';return;}

  const dstDs=state.classes[dstCi]?.schedule[dstDi];
  if(!dstDs){msg.textContent='目標班級該天沒有課，無法複製';return;}

  // Map varKey to actual variant
  let dstVariant;
  if(dstVarKey==='8'){
    if(!dstDs.hasEighth){msg.textContent='目標班級該天沒有第八節';return;}
    dstVariant='8';
  } else if(dstVarKey==='n-flex'){
    if(!dstDs.isFlex){msg.textContent='目標班級該天沒有彈性課程';return;}
    dstVariant='n';
  } else {
    if(dstDs.isFlex){msg.textContent='目標班級該天為彈性課，請選「彈性」';return;}
    dstVariant='n';
  }

  const {week,di,ci,variant}=singleCopySrc;
  FIELD_LABELS.forEach((_,fi)=>{
    const srcKey=`w${week}_d${di}_c${ci}_${variant}_f${fi}`;
    const dstKey=`w${week}_d${dstDi}_c${dstCi}_${dstVariant}_f${fi}`;
    state.data[dstKey]=state.data[srcKey]||'';
  });
  singleCopySrc=null;
  document.getElementById('sc-overlay')?.remove();
  saveState();render();
}

// Build ordered lesson sequence for a class in a week
// Returns array of {di, variant} in day order
function getClassSequence(ci, copyNormal, copyFlex, copyEighth){
  // Returns three independent sequences: normal, flex, eighth
  const normal=[], flex=[], eighth=[];
  for(let di=0;di<5;di++){
    const ds=state.classes[ci]?.schedule[di];
    if(!ds)continue;
    if(copyNormal&&!ds.isFlex&&ds.period) normal.push({di,variant:'n'});
    if(copyFlex&&ds.isFlex) flex.push({di,variant:'n'});
    if(copyEighth&&ds.hasEighth) eighth.push({di,variant:'8'});
  }
  return {normal, flex, eighth};
}

function executeBatchCopy(){
  const msg=document.getElementById('copy-msg');
  const srcCi=window._copySrcIdx;
  const dstCis=[...(window._copyDstIdxs||[])];
  if(srcCi==null){msg.className='copy-msg err';msg.textContent='請選擇來源班級';return;}
  if(!dstCis.length){msg.className='copy-msg err';msg.textContent='請選擇至少一個目標班級';return;}

  const wStart=parseInt(document.getElementById('copy-week-start').value)||1;
  const wEnd=parseInt(document.getElementById('copy-week-end').value)||state.totalWeeks;
  const copyNormal=document.getElementById('copy-normal').checked;
  const copyFlex=document.getElementById('copy-flex').checked;
  const copyEighth=document.getElementById('copy-eighth').checked;
  if(wStart>wEnd){msg.className='copy-msg err';msg.textContent='週次範圍錯誤';return;}

  let count=0;
  for(let w=wStart;w<=wEnd;w++){
    const srcSeqs=getClassSequence(srcCi,copyNormal,copyFlex,copyEighth);

    dstCis.forEach(dstCi=>{
      const dstSeqs=getClassSequence(dstCi,copyNormal,copyFlex,copyEighth);
      // Pair each type independently
      ['normal','flex','eighth'].forEach(type=>{
        const src=srcSeqs[type];
        const dst=dstSeqs[type];
        const len=Math.min(src.length,dst.length);
        for(let i=0;i<len;i++){
          FIELD_LABELS.forEach((_,fi)=>{
            const srcKey=`w${w}_d${src[i].di}_c${srcCi}_${src[i].variant}_f${fi}`;
            const dstKey=`w${w}_d${dst[i].di}_c${dstCi}_${dst[i].variant}_f${fi}`;
            if(state.data[srcKey]!==undefined){state.data[dstKey]=state.data[srcKey];count++;}
          });
        }
      });
    });
  }

  saveState();render();
  msg.className='copy-msg ok';
  msg.textContent=`✓ 已依課次順序複製 ${Math.floor(count/3)} 個節次到 ${dstCis.length} 個班級`;
}

function updateSched(ci,di){

// JSON IMPORT
function importScheduleJSON(){
  const raw=document.getElementById('schedule-json').value.trim();
  const msg=document.getElementById('schedule-msg');
  try{
    const arr=JSON.parse(raw);
    if(!Array.isArray(arr))throw new Error('需為陣列');
    arr.forEach((cls,i)=>{
      if(!cls.name)throw new Error(`第${i+1}個班級缺少 name`);
      if(!Array.isArray(cls.schedule)||cls.schedule.length!==5)throw new Error(`${cls.name} schedule 需為5個元素`);
    });
    // Warn if existing classes will be replaced
    if(state.classes.length>0){
      const oldNames=state.classes.map(c=>c.name).join('、');
      const newNames=arr.map(c=>c.name).join('、');
      const ok=confirm(`匯入課表將取代目前的班級設定。\n\n目前班級：${oldNames}\n匯入班級：${newNames}\n\n已輸入的進度內容會保留，但若班級數量或順序不同，內容可能對應到不同班級。\n\n確定繼續匯入？`);
      if(!ok){msg.className='import-msg err';msg.textContent='已取消匯入';return;}
    }
    state.classes=arr;saveState();renderClassSetups();render();
    msg.className='import-msg ok';msg.textContent=`✓ 成功匯入 ${arr.length} 個班級`;
  }catch(e){msg.className='import-msg err';msg.textContent='✗ '+e.message;}
}
function importCalendarJSON(){
  const raw=document.getElementById('calendar-json').value.trim();
  const msg=document.getElementById('calendar-msg');
  try{
    const arr=JSON.parse(raw);
    if(!Array.isArray(arr))throw new Error('需為陣列');
    const validTypes=['exam','review','holiday','other'];
    arr.forEach((item,i)=>{
      if(!item.date)throw new Error(`第${i+1}項缺少 date`);
      if(!validTypes.includes(item.type))throw new Error(`第${i+1}項 type 無效`);
      if(!item.note)throw new Error(`第${i+1}項缺少 note`);
    });
    arr.forEach(item=>{
      const exists=state.specialDays.findIndex(s=>s.date===item.date);
      if(exists>=0)state.specialDays[exists]=item;
      else state.specialDays.push(item);
    });
    state.specialDays.sort((a,b)=>a.date.localeCompare(b.date));

    // Auto-update totalWeeks if calendar has dates beyond current setting
    if(state.startDate){
      let maxWeek=state.totalWeeks;
      arr.forEach(item=>{
        const itemDate=new Date(item.date);
        const mon=getWeekMonday(1);
        if(!mon)return;
        const diffDays=Math.floor((itemDate-mon)/86400000);
        const weekNum=Math.floor(diffDays/7)+1;
        if(weekNum>maxWeek)maxWeek=weekNum;
      });
      if(maxWeek>state.totalWeeks){
        state.totalWeeks=maxWeek;
        msg.className='import-msg ok';
        msg.textContent=`✓ 成功匯入 ${arr.length} 筆特殊日，總週數已自動更新為 ${maxWeek} 週`;
      } else {
        msg.className='import-msg ok';
        msg.textContent=`✓ 成功匯入 ${arr.length} 筆特殊日`;
      }
    } else {
      msg.className='import-msg ok';msg.textContent=`✓ 成功匯入 ${arr.length} 筆特殊日`;
    }
    saveState();renderSpecialList();render();
  }catch(e){msg.className='import-msg err';msg.textContent='✗ '+e.message;}
}

function addSpecialDay(){
  const ds=document.getElementById('sp-date-start').value;
  const de=document.getElementById('sp-date-end').value||ds;
  const type=document.getElementById('sp-type').value;
  const note=document.getElementById('sp-note').value.trim();
  if(!ds){alert('請選擇開始日期');return;}
  if(!note){alert('請填寫說明');return;}
  const start=new Date(ds),end=new Date(de);
  if(end<start){alert('結束日期不能早於開始日期');return;}
  const cur=new Date(start);
  while(cur<=end){
    const dk=cur.toISOString().slice(0,10);
    const exists=state.specialDays.findIndex(s=>s.date===dk);
    const entry={date:dk,type,note};
    if(exists>=0)state.specialDays[exists]=entry;
    else state.specialDays.push(entry);
    cur.setDate(cur.getDate()+1);
  }
  state.specialDays.sort((a,b)=>a.date.localeCompare(b.date));
  saveState();renderSpecialList();render();
  document.getElementById('sp-date-start').value='';
  document.getElementById('sp-date-end').value='';
  document.getElementById('sp-note').value='';
}
